version: "2"

linters:
  default: none
  enable:
    - dupl
    - dupword
    - errcheck
    - godot
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - style
    - whitespace
    - wsl_v5
  settings:
    custom:
      style:
        type: module
        description: Enforce custom Go style rules with the gclint style plugin.
